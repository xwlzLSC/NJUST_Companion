name: Android Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 安卓版本名，例如 2.0.1
        required: true
        type: string
      version_code:
        description: 安卓版本号，必须递增，例如 2
        required: true
        type: string
      release_notes:
        description: GitHub Release 说明，可留空
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      APP_VERSION_NAME: ${{ inputs.version_name }}
      APP_VERSION_CODE: ${{ inputs.version_code }}
      ANDROID_SIGNING_STORE_FILE: ${{ github.workspace }}/android/release.keystore
      ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Validate version progression
        shell: bash
        run: |
          set -euo pipefail
          LATEST_URL="https://github.com/${{ github.repository }}/releases/latest/download/version.json"
          if curl -fsSL "$LATEST_URL" -o latest-version.json; then
            PREV_CODE="$(node -e "const fs=require('node:fs');const data=JSON.parse(fs.readFileSync('latest-version.json','utf8'));process.stdout.write(String(Number.parseInt(data.versionCode,10)||0));")"
            NEXT_CODE="${APP_VERSION_CODE}"
            if [ "${NEXT_CODE}" -le "${PREV_CODE}" ]; then
              echo "version_code 必须递增。当前 latest versionCode=${PREV_CODE}，你输入的是 ${NEXT_CODE}。"
              exit 1
            fi
          else
            echo "未找到现有 version.json，跳过 versionCode 递增检查。"
          fi

      - name: Restore release keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/release.keystore

      - name: Ensure Gradle wrapper is executable
        shell: bash
        run: chmod +x android/gradlew

      - name: Build signed release APK
        run: npm run apk:release

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${APP_VERSION_NAME}"
          APK_DIR="android/app/build/outputs/apk/release"
          APK_SRC="${APK_DIR}/app-release.apk"
          APK_STABLE="${APK_DIR}/NJUST_Companion-release.apk"
          APK_VERSIONED="${APK_DIR}/NJUST_Companion-v${APP_VERSION_NAME}.apk"
          MANIFEST_PATH="${APK_DIR}/version.json"
          cp "${APK_SRC}" "${APK_STABLE}"
          cp "${APK_SRC}" "${APK_VERSIONED}"
          printf "%s" "${{ inputs.release_notes }}" > release-notes.txt
          if [ ! -s release-notes.txt ]; then
            cat > release-notes.txt <<EOF
          Android Release ${APP_VERSION_NAME}

          - versionName: ${APP_VERSION_NAME}
          - versionCode: ${APP_VERSION_CODE}
          - stable APK: NJUST_Companion-release.apk
          EOF
          fi
          export TAG APP_VERSION_NAME APP_VERSION_CODE MANIFEST_PATH
          export RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"
          export DOWNLOAD_URL="${{ github.server_url }}/${{ github.repository }}/releases/latest/download/NJUST_Companion-release.apk"
          export VERSIONED_DOWNLOAD_URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${TAG}/NJUST_Companion-v${APP_VERSION_NAME}.apk"
          export PUBLISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          node <<'EOF'
          const fs = require('node:fs');
          const manifest = {
            tag: process.env.TAG,
            versionName: process.env.APP_VERSION_NAME,
            versionCode: Number.parseInt(process.env.APP_VERSION_CODE, 10) || 0,
            publishedAt: process.env.PUBLISHED_AT,
            releaseUrl: process.env.RELEASE_URL,
            downloadUrl: process.env.DOWNLOAD_URL,
            versionedDownloadUrl: process.env.VERSIONED_DOWNLOAD_URL,
            notes: fs.readFileSync('release-notes.txt', 'utf8').trim()
          };
          fs.writeFileSync(process.env.MANIFEST_PATH, `${JSON.stringify(manifest, null, 2)}\n`, 'utf8');
          EOF
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "APK_STABLE=${APK_STABLE}" >> "$GITHUB_ENV"
          echo "APK_VERSIONED=${APK_VERSIONED}" >> "$GITHUB_ENV"
          echo "MANIFEST_PATH=${MANIFEST_PATH}" >> "$GITHUB_ENV"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ inputs.version_name }}
          path: |
            ${{ env.APK_STABLE }}
            ${{ env.APK_VERSIONED }}
            ${{ env.MANIFEST_PATH }}

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${TAG}" --notes-file release-notes.txt
            gh release upload "${TAG}" "${APK_STABLE}" "${APK_VERSIONED}" "${MANIFEST_PATH}" --clobber
          else
            gh release create "${TAG}" "${APK_STABLE}" "${APK_VERSIONED}" "${MANIFEST_PATH}" --title "${TAG}" --notes-file release-notes.txt
          fi
